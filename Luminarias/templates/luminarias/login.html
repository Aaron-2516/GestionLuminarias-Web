<!DOCTYPE html>
<html lang="es">

<head>

    {% load static %}

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Iniciar Sesión
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="{% static 'app/css/login.css' %}">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <!-- LOGO -->

        <div class="logo">
            <img
                src="{% static 'app/img/logo2.0.gif' %}"
                alt="Logo LumSys"
                class="logo-img"
            >
        </div>

        <!-- TITULO -->

        <h1 class="title">
            Bienvenido
        </h1>

        <p class="subtitle">
            Sistema de Gestión de Alumbrado Público
        </p>

        <!-- FORMULARIO -->

        <form method="POST">

            {% csrf_token %}

            {% if messages %}
                {% for message in messages %}
                    <p class="login-{{ message.tags }}">
                        {{ message }}
                    </p>
                {% endfor %}
            {% endif %}

            {% if error %}

            <p class="login-error">
                {{ error }}
            </p>

            {% endif %}

            <!-- USUARIO -->

            <div class="form-group">

                <label class="label">
                    Usuario
                </label>

                <input
                    type="text"
                    name="username"
                    class="input"
                    placeholder="Ingrese su usuario"
                    required
                >

            </div>

            <!-- PASSWORD -->

            <div class="form-group">

                <label class="label">
                    Contraseña
                </label>

                <div class="password-field">
                    <input
                        type="password"
                        name="password"
                        class="input"
                        placeholder="Ingrese su contraseña"
                        required
                    >

                    <button
                        type="button"
                        class="password-toggle"
                        aria-label="Mostrar contrasena"
                    >
                        Ver
                    </button>
                </div>

            </div>

            <!-- BOTON -->

            <button type="submit" class="login-btn">

                Iniciar Sesión

            </button>

        </form>

        <a href="{% url 'cambiar_contrasena' %}" class="password-link">
            Cambiar contraseña
        </a>

        <!-- FOOTER -->

        <div class="footer">

            <span class="system">
                LumSys
            </span>

            · Plataforma Municipal
        </div>

    </div>

</div>

<script src="{% static 'app/js/password_toggle.js' %}"></script>

</body>

</html>
